<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Offline Indigenous Language Tools | Audio Bear + Flashcard Reader | Indigenize</title>
  <meta name="description" content="Offline, screen-free language tools for early learners. Audio teddy bears and flashcard readers loaded with community-owned recordings for homes, classrooms, and language nests." />

  <!-- Font best practice: Inter is clean and readable. If you want a warmer, more “human” look,
       use Manrope for headings only. Keep body in Inter for legibility. -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #fbfaf7;
      --card: #ffffff;
      --text: #1b1f24;
      --muted: #5f6b7a;
      --line: #e6e2d8;
      --burntOrange: #d95d39;
      --shadow: 0 12px 34px rgba(0,0,0,.08);

      /* Match radius + spacing across all boxes */
      --boxRadius: 22px;
      --boxPad: 60px;
      --boxBorder: 1px solid var(--line);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    h1,h2,h3,h4 { font-family: 'Manrope', 'Inter', system-ui, -apple-system, sans-serif; }

    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      padding: 12px 0;
    }
    .nav-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .brand img { height: 58px; width: auto; display: block; }

    .btn {
      display: inline-flex;
      align-items: center;
      padding: 12px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 800;
      font-size: 14px;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }
    .btn-primary {
      background: var(--burntOrange);
      color: white;
      box-shadow: 0 4px 14px rgba(217, 93, 57, 0.25);
    }
    .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.06); }
    .btn-outline {
      border-color: var(--line);
      background: white;
      color: var(--text);
    }
    .btn-outline:hover { background: #f9f9f9; }

    .wrap { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
    section { padding: 6px 0; }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.3fr 0.7fr;
      gap: 60px;
      align-items: end;
    }
    h1 { font-size: 52px; line-height: 1.1; font-weight: 900; letter-spacing: -0.04em; margin: 0 0 18px; }
    .lede { font-size: 20px; color: var(--muted); margin-bottom: 26px; }

    .hero-note {
      margin-top: 18px;
      padding: 14px 16px;
      border: var(--boxBorder);
      background: rgba(255,255,255,0.7);
      border-radius: 14px;
      font-size: 14px;
      color: var(--muted);
    }
    .hero-note strong { color: var(--text); }

    /* Unified “box” styling */
    .box {
      background: var(--card);
      border-radius: var(--boxRadius);
      border: var(--boxBorder);
      box-shadow: var(--shadow);
    }
    .box-pad { padding: var(--boxPad); }

    /* Trust Strip */
    .trust-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      text-align: center;
      margin-top: 40px;
    }
    .trust-inner { padding: 30px; }
    .trust-item h4 {
      margin: 0;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 800;
    }
    .trust-item p { margin: 6px 0 0; font-weight: 900; font-size: 15px; }

    /* Product */
    .product-section { margin-bottom: 40px; }
    .product-grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 60px; align-items: center; }
    .product-grid.reverse { grid-template-columns: 1.1fr 1fr; }

    .label {
      color: var(--burntOrange);
      font-weight: 900;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: block;
      margin-bottom: 10px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    h2 { font-size: 36px; margin: 0 0 18px; letter-spacing: -0.02em; font-weight: 900; }

    .specs-table { width: 100%; border-collapse: collapse; margin-top: 22px; }
    .specs-table td { padding: 12px 0; border-bottom: 1px solid var(--line); font-size: 14px; vertical-align: top; }
    .specs-table td:first-child { font-weight: 900; width: 160px; color: var(--muted); }

    .note { margin-top: 14px; font-size: 13px; color: var(--muted); }

    /* Workflow */
    .workflow-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 30px; margin-top: 40px; }
    .step-num { font-size: 40px; font-weight: 900; color: var(--line); line-height: 1; margin-bottom: 10px; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .step h4 { margin: 0 0 10px; font-size: 18px; font-weight: 900; }
    .step p { margin: 0; color: var(--muted); }

    /* Demo kit */
    .demo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
    .demo-card { background: #fbfaf7; padding: 26px; border-radius: 16px; border: 1px solid var(--line); }
    .demo-card h4 { margin: 0 0 10px; font-size: 20px; font-weight: 900; }
    .demo-card ul { list-style: none; padding: 0; margin: 0; color: var(--muted); font-size: 14px; }
    .demo-card li { padding: 5px 0; }
    .demo-actions { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 22px; }

    @media (max-width: 900px) {
      .hero-grid, .product-grid, .product-grid.reverse, .demo-grid { grid-template-columns: 1fr; gap: 40px; }
      h1 { font-size: 40px; }
      :root { --boxPad: 30px; }
      .specs-table td:first-child { width: 140px; }
    }
  </style>
</head>

<body>

<header>
  <div class="nav-container">
    <a href="http://www.indigenize.toys" class="brand"><img src="../indigenize_LogoV1.png" alt="Indigenize"></a>
    <nav style="display:flex; gap: 20px; align-items:center;">
      <a href="/connect" class="btn btn-primary">Contact</a>
    </nav>
  </div>
</header>

<main class="wrap" style="padding-top: 60px; padding-bottom: 60px; min-height: 60vh;">
  <div class="box box-pad" style="max-width: 800px; margin: 0 auto;">
    <iframe data-tally-src="https://tally.so/embed/Pd0pj5?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="589" frameborder="0" marginheight="0" marginwidth="0" title="Let's Connect"></iframe>
    <script>var d=document,w="https://tally.so/widgets/embed.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function(e){e.src=e.dataset.tallySrc}))};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w,s.onload=v,s.onerror=v,d.body.appendChild(s);}</script>
  </div>
</main>

<footer style="padding: 60px 0; border-top: 1px solid var(--line); text-align: center; font-size: 14px; color: var(--muted);">
  <div class="wrap">
    <p>© 2026 Indigenize. Based in Coast Salish Territory.</p>
    <div style="display: flex; justify-content: center; gap: 20px; margin-top: 20px;">
      <a href="https://www.instagram.com/indigenizetechnology/" target="_blank" rel="noopener" style="color: inherit;">Instagram</a>
      <a href="https://solve.mit.edu/solutions/98780" target="_blank" rel="noopener" style="color: inherit;">MIT Solve Overview</a>
    </div>
  </div>
</footer>

</body>
</html>
